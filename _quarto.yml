  description: "Florence, Naples & Puglia — June 5-20, 2026 travel planning site"

  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Research"
        menu:
          - text: "June Calendar"
            href: research/june-calendar.qmd
          - text: "Pre-Departure Checklist"
            href: research/pre-departure-checklist.qmd
          - text: "---"
          - text: "Flights"
            href: research/flights.qmd
          - text: "Trains"
            href: research/trains.qmd
          - text: "Accommodations"
            href: research/accommodations.qmd
          - text: "Tours"
            href: research/tours.qmd
          - text: "Museums"
            href: research/museums.qmd
          - text: "Florence Tickets"
            href: research/tickets-florence.qmd
          - text: "Naples Tickets"
            href: research/tickets-naples.qmd
          - text: "Restaurants"
            href: research/restaurants.qmd
          - text: "Packing List"
            href: research/packing-list.qmd
      - text: "Regions"
        menu:
          - text: "Florence"
            href: regions/florence.qmd
          - text: "Naples"
            href: regions/naples.qmd
          - text: "Puglia"
            href: regions/puglia.qmd
