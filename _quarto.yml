  subtitle: "Florence, Naples & Puglia"
  description: "Travel website for June 2026 Italy trip"
  favicon: "fav.jpg"

  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Research"
        menu:
          - text: "Flights"
            href: research/flights.qmd
          - text: "Trains"
