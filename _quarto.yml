format:
  html:
    theme:
      light:
        - lux
        - custom-light.scss
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: false
    link-external-newwindow: true
    code-copy: true
    code-overflow: wrap

execute:
  freeze: auto

editor: visual
